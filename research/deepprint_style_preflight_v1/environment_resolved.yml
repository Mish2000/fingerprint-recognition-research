  torch_interop_threads: 1
  opencv_threads: 1
  deterministic_algorithms: true
  cuda_used: false
notes:
  - The target repository environment, pyproject.toml, and environment.yml were not changed.
  - The external source was imported by an explicit runtime path; it was not copied or installed into the target repository.
  - The source requirements are unbounded; this file records the exact versions resolved for this preflight.
